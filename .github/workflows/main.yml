name: Deploy Backend

on:
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify monorepo
        run: |
          npm run lint
          npm run typecheck
          npm run build:backend

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        env:
          IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/bone-backend
        run: |
          docker build -t $IMAGE_NAME:latest -f Dockerfile .
          docker push $IMAGE_NAME:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy infra and export backend env
        id: infra_env
        env:
          CDK_ENV_NAME: ${{ vars.CDK_ENV_NAME }}
          CDK_BUCKET_NAME: ${{ vars.CDK_BUCKET_NAME }}
          CDK_FRONTEND_ORIGINS: ${{ vars.CDK_FRONTEND_ORIGINS }}
          CDK_EXISTING_EC2_ROLE_NAME: ${{ vars.CDK_EXISTING_EC2_ROLE_NAME }}
          CDK_DEFAULT_REGION: ${{ vars.AWS_REGION }}
        run: |
          set -eu

          cd infra/cdk
          npm install
          npx cdk deploy --require-approval never --outputs-file cdk-outputs.json
          node scripts/export-backend-env.mjs --file cdk-outputs.json --stack BonInfraStack > backend.env
          cat backend.env >> "$GITHUB_ENV"

          while IFS='=' read -r key value; do
            echo "$key=$value" >> "$GITHUB_OUTPUT"
          done < backend.env

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          S3_BUCKET: ${{ steps.infra_env.outputs.S3_BUCKET }}
          S3_REGION: ${{ steps.infra_env.outputs.S3_REGION }}
          S3_PUBLIC_BASE_URL: ${{ steps.infra_env.outputs.S3_PUBLIC_BASE_URL }}
          S3_UPLOAD_PREFIX: ${{ steps.infra_env.outputs.S3_UPLOAD_PREFIX }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -eu

            IMAGE_NAME=${{ secrets.DOCKER_USERNAME }}/bone-backend

            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            docker pull $IMAGE_NAME:latest
            docker stop bone-backend || true
            docker rm bone-backend || true

            docker run -d \
              --name bone-backend \
              --restart unless-stopped \
              -p 4000:4000 \
              -e NODE_ENV=production \
              -e PORT=4000 \
              -e SESSION_SECRET="${{ secrets.SESSION_SECRET }}" \
              -e SESSION_TABLE_NAME="${{ secrets.SESSION_TABLE_NAME }}" \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              -e OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
              -e OPENAI_BASE_URL="${{ secrets.OPENAI_BASE_URL }}" \
              -e LLM_MODEL="${{ secrets.LLM_MODEL }}" \
              -e EMBEDDING_MODEL="${{ secrets.EMBEDDING_MODEL }}" \
              -e EMBEDDING_DIM="${{ secrets.EMBEDDING_DIM }}" \
              -e RAG_TOP_K="${{ secrets.RAG_TOP_K }}" \
              -e RAG_MIN_SCORE="${{ secrets.RAG_MIN_SCORE }}" \
              -e LLM_PROMPT_COST_PER_1K="${{ secrets.LLM_PROMPT_COST_PER_1K }}" \
              -e LLM_COMPLETION_COST_PER_1K="${{ secrets.LLM_COMPLETION_COST_PER_1K }}" \
              -e S3_BUCKET="${{ steps.infra_env.outputs.S3_BUCKET }}" \
              -e S3_REGION="${{ steps.infra_env.outputs.S3_REGION }}" \
              -e S3_PUBLIC_BASE_URL="${{ steps.infra_env.outputs.S3_PUBLIC_BASE_URL }}" \
              -e S3_UPLOAD_PREFIX="${{ steps.infra_env.outputs.S3_UPLOAD_PREFIX }}" \
              $IMAGE_NAME:latest
